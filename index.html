<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食導航員 - 先選想食乜</title>
    <style>
        /* --- 啟動畫面與基礎樣式 --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #FFAFBD; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #splash.hidden { opacity: 0; visibility: hidden; }
        .splash-logo { font-size: 5rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-30px);} 60% {transform: translateY(-15px);} }

        body {
            background-color: #A2D2FF; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            margin: 0; font-family: "Microsoft JhengHei", sans-serif;
        }

        .container {
            text-align: center; background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 5px solid #FFAFBD;
            width: 90%; max-width: 500px; min-height: 400px;
        }

        .breadcrumb { font-size: 0.9rem; color: #888; margin-bottom: 15px; }
        h1 { color: #555; font-size: 1.6rem; margin-bottom: 20px; min-height: 3rem; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        button {
            background-color: #FFC8DD; border: none; padding: 15px;
            font-size: 1.1rem; font-weight: bold; color: #555;
            border-radius: 15px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px #ff9bbd;
        }
        button:active { transform: translateY(3px); box-shadow: 0 0 #ff9bbd; }

        .random-btn { background-color: #BDE0FE; box-shadow: 0 4px #8ecae6; grid-column: span 2; }
        .back-btn { background-color: #eee; box-shadow: 0 4px #ccc; margin-top: 20px; grid-column: span 2; }
        
        .maps-btn {
            background-color: #4285F4; color: white; box-shadow: 0 4px #3367D6;
            margin-top: 15px; text-decoration: none; display: none;
            padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.2rem;
        }

        #final-result { font-size: 2.5rem; color: #FF6B6B; margin: 20px 0; display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🍽️</div>
        <div class="splash-text">搵緊啱你心水嘅嘢食...</div>
    </div>

    <div class="container">
        <div class="breadcrumb" id="path">首頁</div>
        <h1 id="title">今日想食邊一類？</h1>
        
        <div id="final-result"></div>
        <a id="maps-link" class="maps-btn" target="_blank">📍 睇吓邊度有得食</a>

        <div id="options-container" class="button-grid">
            </div>

        <button class="back-btn" id="back-btn" style="display:none;" onclick="goBack()">⬅️ 返回重選</button>
    </div>

    <script>
        // 核心數據：先分大類，再分預算
        const foodDict = {
            "日本菜 🇯🇵": {
                "平價之選 ($100以下)": "拉麵/丼飯",
                "中價享受 ($100-400)": "居酒屋/壽司",
                "奢華體驗 ($800以上)": "Omakase/燒肉"
            },
            "中菜 🥢": {
                "街坊風味 ($60以下)": "茶餐廳/雲吞麵",
                "得閒飲茶 ($100-200)": "酒樓點心",
                "高級粵菜 ($500以上)": "中菜廳/片皮鴨"
            },
            "西餐 🍕": {
                "輕食快餐 ($80以下)": "漢堡包/三文治",
                "情調約會 ($200-500)": "意大利餐廳/牛扒",
                "Fine Dining ($800以上)": "法式料理"
            },
            "東南亞 🥥": {
                "惹味地道 ($100以下)": "泰式粉麵/海南雞",
                "聚會必選 ($200-400)": "越南菜/星馬菜",
                "特色風味 ($500以上)": "私房東南亞料理"
            }
        };

        const regions = ["附近", "旺角/油麻地", "尖沙咀", "銅鑼灣", "觀塘", "沙田"];

        let currentStep = "foodType"; // foodType, budget, region, result
        let selectedFood = "";
        let selectedBudget = "";
        let selectedRegion = "";

        const titleEl = document.getElementById('title');
        const optionsEl = document.getElementById('options-container');
        const pathEl = document.getElementById('path');
        const backBtn = document.getElementById('back-btn');
        const resultEl = document.getElementById('final-result');
        const mapsLink = document.getElementById('maps-link');

        function render() {
            optionsEl.innerHTML = "";
            resultEl.style.display = "none";
            mapsLink.style.display = "none";
            optionsEl.style.display = "grid";

            if (currentStep === "foodType") {
                titleEl.innerText = "今日想食邊一類？";
                pathEl.innerText = "首頁";
                backBtn.style.display = "none";
                Object.keys(foodDict).forEach(type => {
                    createButton(type, () => { selectedFood = type; currentStep = "budget"; render(); });
                });

            } else if (currentStep === "budget") {
                titleEl.innerText = `${selectedFood}，預算係？`;
                pathEl.innerText = selectedFood;
                backBtn.style.display = "block";
                Object.keys(foodDict[selectedFood]).forEach(b => {
                    createButton(b, () => { selectedBudget = b; currentStep = "region"; render(); });
                });

            } else if (currentStep === "region") {
                titleEl.innerText = "想喺邊度食？";
                pathEl.innerText = `${selectedFood} > ${selectedBudget}`;
                regions.forEach(r => {
                    createButton(r, () => { selectedRegion = r; showFinal(); });
                });
            }
        }

        function createButton(text, onClick) {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = onClick;
            optionsEl.appendChild(btn);
        }

        function showFinal() {
            currentStep = "result";
            const foodName = foodDict[selectedFood][selectedBudget];
            titleEl.innerText = `建議方案：`;
            resultEl.innerHTML = `<span style="font-size: 1.5rem; color: #888;">${selectedRegion}</span><br>${foodName}`;
            resultEl.style.display = "block";
            optionsEl.style.display = "none";

            // 生成 Google Maps 連結： [地區] [食物]
            const searchQuery = `${selectedRegion === "附近" ? "" : selectedRegion} ${foodName}`;
            mapsLink.href = `https://www.google.com/maps/search/${encodeURIComponent(searchQuery)}`;
            mapsLink.style.display = "block";
        }

        function goBack() {
            if (currentStep === "budget") currentStep = "foodType";
            else if (currentStep === "region") currentStep = "budget";
            else if (currentStep === "result") currentStep = "region";
            render();
        }

        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1500);
        });

        render();
    </script>
</body>
</html>
