<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>層次晚餐決定器</title>
    <style>
        body {
            background-color: #A2D2FF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 5px solid #FFAFBD;
            width: 90%;
            max-width: 500px;
        }

        .breadcrumb {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
        }

        h1 { color: #555; font-size: 1.8rem; margin-bottom: 20px; }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: #FFC8DD;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px #ff9bbd;
        }

        button:active { transform: translateY(3px); box-shadow: 0 0 #ff9bbd; }

        .random-btn {
            grid-column: span 2;
            background-color: #BDE0FE;
            box-shadow: 0 4px #8ecae6;
        }

        .back-btn {
            background-color: #eee;
            box-shadow: 0 4px #ccc;
            margin-top: 20px;
            grid-column: span 2;
        }

        #final-result {
            font-size: 2.5rem;
            color: #FF6B6B;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="breadcrumb" id="path">首頁</div>
        <h1 id="title">想食邊一洲？</h1>
        
        <div id="final-result"></div>

        <div id="options-container" class="button-grid">
            </div>

        <button class="back-btn" id="back-btn" style="display:none;" onclick="goBack()">⬅️ 返回上一層</button>
    </div>

    <script>
        // 1. 這裡定義所有的資料 (數據庫)
        const menuData = {
           // 1. 這裡定義全球五大洲的完整數據庫
        const menuData = {
            "亞洲": {
                "中港": ["叉燒飯 🍛", "雲吞麵 🍜", "點心 🥟", "北京填鴨 🦆", "麻婆豆腐 🥘"],
                "日本": ["壽司 🍣", "拉麵 🍜", "天婦羅 🍤", "大阪燒 🍳", "和牛燒肉 🥩"],
                "韓國": ["泡菜鍋 🍲", "韓式炸雞 🍗", "石鍋拌飯 🥘", "部隊鍋 🥘"],
                "星馬泰": ["冬蔭功 🥣", "泰式炒金邊粉 🍜", "海南雞飯 🐔", "肉骨茶 🍵", "沙嗲 🍢"],
                "越南": ["越南河粉 🍜", "越式法包 🥖"]
            },
            "歐洲": {
                "意大利": ["薄餅 🍕", "卡邦尼意粉 🍝", "千層麵 🥘", "意大利飯 🍚"],
                "法國": ["焗鵝肝 🦆", "焗蝸牛 🐌", "法式洋蔥湯 🥣"],
                "西班牙": ["西班牙海鮮飯 🥘", "塔帕斯 Tapas 🥖", "西班牙油條 🥨"],
                "英國": ["炸魚薯條 🐟🍟", "英式早餐 🍳", "牧羊人派 🥧"],
                "德國": ["德國豬手 🍖", "德國香腸 🌭", "酸菜 🥬"],
                "瑞士": ["芝士火鍋 🧀", "薯餅 Rösti 🥔"],
		"葡萄牙": ["葡撻 🥧", "馬介休 🐟"]
            },
            "美洲": {
                "美國": ["芝士漢堡 🍔", "燒烤肋骨 🍖", "熱狗 🌭", "水牛城雞翼 🍗"],
                "墨西哥": ["塔可 Taco 🌮", "納喬奶酪玉米片 🥗", "墨西哥捲餅 🌯"],
                "巴西": ["巴西燒烤 🥩", "黑豆燉肉 🍲"]
            },
            "大洋洲": {
                "澳洲": ["澳洲肉批 🥧", "燒烤海鮮 🦐", "炸魚薯條 🍟"],
                "新西蘭": ["毛利傳統窯烤 Hangi 🥘", "羊扒 🥩"]
            },
            "非洲/其他": {
                "非洲": ["庫斯庫斯 Couscous 🍚", "摩洛哥燉鍋 Tagine 🥘"],
                "俄羅斯": ["羅宋湯 🥣", "俄國餃子 🥟", "俄羅斯酸奶牛肉 🍛"]
            }
        };"]
            }
        };

        let currentLevel = "root"; // root, continent, country
        let selectedContinent = "";
        let selectedCountry = "";

        const titleEl = document.getElementById('title');
        const optionsEl = document.getElementById('options-container');
        const pathEl = document.getElementById('path');
        const backBtn = document.getElementById('back-btn');
        const resultEl = document.getElementById('final-result');

        function render() {
            optionsEl.innerHTML = "";
            resultEl.style.display = "none";
            optionsEl.style.display = "grid";

            if (currentLevel === "root") {
                titleEl.innerText = "想食邊一洲？";
                pathEl.innerText = "首頁";
                backBtn.style.display = "none";
                
                Object.keys(menuData).forEach(continent => {
                    createButton(continent, () => selectContinent(continent));
                });
                createRandomButton("隨機選一洲", () => {
                    const keys = Object.keys(menuData);
                    selectContinent(keys[Math.floor(Math.random() * keys.length)]);
                });

            } else if (currentLevel === "continent") {
                titleEl.innerText = `想去 ${selectedContinent} 邊度？`;
                pathEl.innerText = `首頁 > ${selectedContinent}`;
                backBtn.style.display = "block";

                Object.keys(menuData[selectedContinent]).forEach(country => {
                    createButton(country, () => selectCountry(country));
                });
                createRandomButton("隨機選國家", () => {
                    const keys = Object.keys(menuData[selectedContinent]);
                    selectCountry(keys[Math.floor(Math.random() * keys.length)]);
                });

            } else if (currentLevel === "country") {
                titleEl.innerText = `想食乜嘢 ${selectedCountry} 菜？`;
                pathEl.innerText = `首頁 > ${selectedContinent} > ${selectedCountry}`;
                
                const foods = menuData[selectedContinent][selectedCountry];
                foods.forEach(food => {
                    createButton(food, () => showFinal(food));
                });
                createRandomButton("隨機選食物", () => {
                    showFinal(foods[Math.floor(Math.random() * foods.length)]);
                });
            }
        }

        function createButton(text, onClick) {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = onClick;
            optionsEl.appendChild(btn);
        }

        function createRandomButton(text, onClick) {
            const btn = document.createElement('button');
            btn.innerText = "🎲 " + text;
            btn.className = "random-btn";
            btn.onclick = onClick;
            optionsEl.appendChild(btn);
        }

        function selectContinent(continent) {
            selectedContinent = continent;
            currentLevel = "continent";
            render();
        }

        function selectCountry(country) {
            selectedCountry = country;
            currentLevel = "country";
            render();
        }

        function showFinal(food) {
            titleEl.innerText = "今日就食：";
            resultEl.innerText = food;
            resultEl.style.display = "block";
            optionsEl.style.display = "none";
        }

        function goBack() {
            if (currentLevel === "country") currentLevel = "continent";
            else if (currentLevel === "continent") currentLevel = "root";
            render();
        }

        // 初始化
        render();
    </script>
</body>
</html>
